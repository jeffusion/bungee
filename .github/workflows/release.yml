name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  packages: write  # Required for pushing to GitHub Container Registry

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Set up Node.js for npm Trusted Publishing
        uses: actions/setup-node@v4
        with:
          node-version: 24
          check-latest: true

      - name: Ensure npm version for Trusted Publishing
        run: |
          echo "Node before npm upgrade: $(node --version)"
          echo "npm before npm upgrade: $(npm --version)"
          npm install -g npm@11.6.2
          NPM_BIN=$(command -v npm)
          NPM_VERSION=$(npm --version)
          MIN_NPM=11.5.1
          echo "NPM_BIN=$NPM_BIN" >> $GITHUB_ENV
          echo "Using npm binary: $NPM_BIN"
          echo "Node after npm upgrade: $(node --version)"
          echo "npm after npm upgrade: $NPM_VERSION"
          if [ "$(printf '%s\n%s\n' "$MIN_NPM" "$NPM_VERSION" | sort -V | head -n1)" != "$MIN_NPM" ]; then
            echo "npm $NPM_VERSION is too old, require >= $MIN_NPM"
            exit 1
          fi

      - name: Prepare test environment
        run: cp config.example.json config.json

      - name: Capture pre-release version
        id: pre-version
        run: |
          PRE_VERSION=$(node -p "require('./package.json').version")
          echo "version=$PRE_VERSION" >> $GITHUB_OUTPUT
          echo "Pre-release version: $PRE_VERSION"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build UI assets
        run: bun run build:ui && bun run bundle:ui

      - name: Run tests
        run: bun test

      - name: Run semantic-release
        id: semantic-release
        run: bunx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Detect whether a new release was published
        id: release-state
        run: |
          POST_VERSION=$(node -p "require('./package.json').version")
          PRE_VERSION="${{ steps.pre-version.outputs.version }}"
          if [ "$POST_VERSION" != "$PRE_VERSION" ]; then
            echo "published=true" >> $GITHUB_OUTPUT
            echo "version=$POST_VERSION" >> $GITHUB_OUTPUT
            echo "Release published: $PRE_VERSION -> $POST_VERSION"
          else
            echo "published=false" >> $GITHUB_OUTPUT
            echo "version=$POST_VERSION" >> $GITHUB_OUTPUT
            echo "No new release published"
          fi

      # Docker build and push steps
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from package.json
        id: package-version
        if: steps.release-state.outputs.published == 'true'
        run: |
          VERSION="${{ steps.release-state.outputs.version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Build and push Docker image
        if: steps.release-state.outputs.published == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/bungee:latest
            ghcr.io/${{ github.repository_owner }}/bungee:${{ steps.package-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and upload binaries to GitHub Release
      - name: Build binaries
        if: steps.release-state.outputs.published == 'true'
        run: bun run build:binaries

      - name: Upload binaries to GitHub Release
        if: steps.release-state.outputs.published == 'true'
        run: bun scripts/upload-binaries.ts ${{ steps.package-version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
